<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: transparent; font-family: 'Montserrat', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }

        #killfeed_container {
            position: absolute; 
            top: 100px; /* 20px -> 60px: Biraz aşağı çekildi */
            right: 20px;
            width: 380px; 
            display: flex; 
            flex-direction: column; 
            gap: 5px;
            align-items: flex-end;
        }

        .feed_entry {
            background: rgba(10, 10, 15, 0.92);
            padding: 6px 12px; border-radius: 4px;
            display: flex; align-items: center; justify-content: flex-end; gap: 10px;
            border-right: 4px solid #444;
            min-width: 220px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
            animation: fastSlide 0.2s ease-out forwards;
        }

        @keyframes fastSlide { from { opacity: 0; transform: translateX(15px); } to { opacity: 1; transform: translateX(0); } }
        .fade-out { animation: fastOut 0.3s ease-in forwards !important; }
        @keyframes fastOut { to { opacity: 0; transform: translateX(25px); } }

        .theme_1 { border-right-color: #ff4757; background: linear-gradient(90deg, rgba(255, 71, 87, 0.1), rgba(10,10,15,0.95)); }
        .theme_2 { border-right-color: #2ed573; background: linear-gradient(90deg, rgba(46, 213, 115, 0.1), rgba(10,10,15,0.95)); }

        .name { font-size: 0.9rem; font-weight: 800; color: white; white-space: nowrap; text-shadow: 0 1px 2px rgba(0,0,0,0.9); }
        .victim { color: #bbb; }

        .weapon_icon { width: 45px; height: 30px; display: flex; align-items: center; justify-content: center; }
        .weapon_icon img { max-width: 100%; max-height: 100%; object-fit: contain; filter: drop-shadow(0 0 2px gold); }

        #test_ui { position: absolute; bottom: 20px; left: 20px; display: flex; gap: 5px; opacity: 0.2; }
        #test_ui:hover { opacity: 1; }
        .t_btn { padding: 5px 10px; cursor: pointer; background: #222; color: #fff; border: 1px solid #444; font-size: 10px; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="killfeed_container"></div>
    <div id="test_ui">
        <button class="t_btn" onclick="AddKillNotice('Bellatrix', 'Sirius Black', 2)">DE Test</button>
        <button class="t_btn" onclick="AddKillNotice('Harry Potter', 'Voldemort', 1)">Auror Test</button>
    </div>

    <script>
        const WANDS = {
            1: "https://i.ibb.co/L6S8zC8/elder-wand.png", 
            2: "https://i.ibb.co/pPz5LgG/voldemort-wand.png"
        };

        window.AddKillNotice = function(att, vic, side) {
            const container = document.getElementById('killfeed_container');
            if (container.children.length >= 6) { container.lastElementChild.remove(); }

            const entry = document.createElement('div');
            entry.className = `feed_entry theme_${side}`;
            const icon = WANDS[side] || "";

            entry.innerHTML = `
                <span class="name attacker">${att}</span>
                <div class="weapon_icon"><img src="${icon}" onerror="this.style.display='none'"></div>
                <span class="name victim">${vic}</span>
            `;

            container.prepend(entry);
            setTimeout(() => {
                entry.classList.add('fade-out');
                setTimeout(() => entry.remove(), 300);
            }, 5000);
        }
    </script>
</body>
</html>
