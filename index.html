<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: transparent !important; 
            overflow: hidden; 
            width: 100vw; 
            height: 100vh;
        }

        #killfeed_container {
            position: fixed !important; /* Absolute yerine Fixed yaparak ekrana çiviliyoruz */
            top: 250px !important;      /* Üstten 250 piksel boşluk (Saat ve ID'nin altına iner) */
            right: 30px !important;     /* Sağdan 30 piksel boşluk */
            width: 400px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px;
            align-items: flex-end;
            z-index: 9999;
        }

        /* Tasarım kısmı (Kompakt ve Optimize) */
        .feed_entry {
            background: rgba(15, 15, 20, 0.95);
            padding: 8px 15px; 
            border-radius: 5px;
            display: flex; 
            align-items: center; 
            gap: 12px;
            border-right: 5px solid #444;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
            animation: slideIn 0.2s ease-out forwards;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .theme_1 { border-right-color: #ff4757; }
        .theme_2 { border-right-color: #2ed573; }
        .name { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; color: white; text-shadow: 1px 1px 2px black; }
        .weapon_icon img { height: 30px; filter: drop-shadow(0 0 2px gold); }
    </style>
</head>
<body>
    <div id="killfeed_container"></div>
    <script>
        const WANDS = {
            1: "https://i.ibb.co/L6S8zC8/elder-wand.png", 
            2: "https://i.ibb.co/pPz5LgG/voldemort-wand.png"
        };

        window.AddKillNotice = function(att, vic, side) {
            const container = document.getElementById('killfeed_container');
            const entry = document.createElement('div');
            entry.className = `feed_entry theme_${side}`;
            const icon = WANDS[side] || "";
            entry.innerHTML = `<span class="name">${att}</span><div class="weapon_icon"><img src="${icon}"></div><span class="name">${vic}</span>`;
            container.prepend(entry);
            setTimeout(() => { entry.remove(); }, 5000);
        }
    </script>
</body>
</html>
